services:
  - type: web
    name: job-security-calculator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: JSC_LLM_URL
        sync: false
      - key: JSC_LLM_MODEL
        value: llama3.2:3b
